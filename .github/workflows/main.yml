name: Build-Dylib
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: theos/setup-theos@master
      - name: Build
        run: make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos
      - uses: actions/upload-artifact@v3
        with:
          name: Result
          path: packages/*.deb
